name: Catalog refresh

# Price discovery now happens in an agent (e.g. Claude Code) with web search,
# which writes a `plans.json` at the repo root. This workflow is the
# deterministic reconcile half: given that plans file, it diffs against
# vendors.json and opens a PR with the applied changes. No API key needed.
#
# Manual trigger only — commit a `plans.json` (or push one to a branch), then
# dispatch this workflow.
on:
  workflow_dispatch:
    inputs:
      plans_path:
        description: "Path to the plans JSON file"
        required: false
        default: "plans.json"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reconcile plans against catalog
        run: python scripts/refresh.py --plans "${{ github.event.inputs.plans_path }}" --apply

      - name: Open PR if catalog changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Catalog refresh: proposed price updates"
          title: "Catalog refresh: proposed price updates"
          body: |
            Reconciled from a `plans.json` produced by web-search research.

            Review the diff carefully — source URLs and confidence levels are
            noted in the run log (Actions tab). Reject anything that looks wrong
            before merging.
          branch: catalog-refresh/${{ github.run_number }}
          delete-branch: true
          add-paths: vendors.json
